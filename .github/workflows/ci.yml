name: CI

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: python -m pip install -e .
      - name: Doctor
        run: craft doctor
      - name: Validate
        run: craft validate
      - name: Catalog JSON
        run: craft catalog --format json --output /tmp/craft-catalog.json
      - name: Catalog Markdown
        run: craft catalog --format md --output docs/skill-catalog.md
      - name: Orchestrator dry run
        run: craft orchestrate examples/plan.json --dry-run
      - name: Plan schema validation
        run: python scripts/validate-plan.py examples/plan.json
      - name: Markdown links
        run: python scripts/check-markdown-links.py .
